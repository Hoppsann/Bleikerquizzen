<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/main.css">
    <script src="../js/script.js" defer></script>
</head>
<body>
    <ul>
      <li><a href="../index.html"><img src="../img/bleikerquizzen-lys.png" alt="" /></a></li>
      <li class="hoverline"><a href="./grafisk.html">Grafisk</a></li>
      <li class="hoverline"><a href="./quiz.html">Quiz</a></li>
      <li class="hoverline"><a href="./video.html">Video</a></li>
      <li class="hoverline"><a href="./SoMe.html">SoMe</a></li>
    </ul>

    <div class="quizhero">
      <div id="quizhero">
        <div>
            <h1>Quiz</h1>
            <h1 id="category">Quiz</h1>
            <p id="question"></p>
            <div id="video"></div>
        </div>
        
        <div id="quiz">
          <div id="quizbuttons"></div>
        </div>
        <p id="feedback"></p>

        <div id="next">
        </div>
      </div>
        <div id="results" style="display: none;">
          <h1>Du fikk</h1>
          <p id="points">1/10 riktig</p>

          <div id="nameentry">
            <p>Skriv inn navnet ditt for å lagre poengsummen:</p>
            <input type="text" id="nameInput" placeholder="Navn..." maxlength="20" />
            <button onclick="saveScore()">Lagre</button>
          </div>

          <div id="leaderboard">
            <h2>Ledertavle</h2>
            <ol id="leaderboardList"></ol>
            <button onclick="clearLeaderboard()">Nullstill ledertavle</button>
          </div>
        </div>
    </div>
    

    <footer>
      <div id="footerLeft">
        <img src="../img/bleikerquizzen-lys.png" alt="" />
      </div>

      <div id="footerMiddle">
        <a href="">Laget av Even</a>
      </div>

      <div id="footerRight">
        <a href="mailto:kontakt@bleikerquizzen.no">kontakt@bleikerquizzen.no</a>
      </div>
    </footer>
</body>
</html>
